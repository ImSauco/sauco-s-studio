<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Export</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f3efe6;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .logo {
      width: 82%;
      height: 82%;
      background: center / contain no-repeat url("saucos-studio-logo.svg");
    }
  </style>
</head>
<body>
  <div class="logo" aria-label="Sauco's Studio logo"></div>
</body>
</html>
