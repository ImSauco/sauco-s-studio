<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <title>OG Export</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f3efe6;
      color: #16232b;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .card {
      width: 1200px;
      height: 630px;
      display: grid;
      grid-template-columns: 320px 1fr;
      align-items: center;
      gap: 2rem;
      padding: 3rem 4rem;
      background: #f3efe6;
    }

    .logo-wrap {
      display: grid;
      place-items: center;
      height: 100%;
    }

    .logo-wrap .logo {
      width: 100%;
      max-width: 250px;
      height: 100%;
      max-height: 430px;
      background: center / contain no-repeat url("saucos-studio-logo.svg");
    }

    .copy {
      max-width: 680px;
    }

    h1 {
      margin: 0;
      font-size: 76px;
      line-height: 0.95;
    }

    .eyebrow {
      margin: 1.5rem 0 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.32em;
    }

    p {
      margin: 1.5rem 0 0;
      font-size: 34px;
      line-height: 1.4;
      color: #5d534c;
      max-width: 22ch;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo-wrap">
      <div class="logo" aria-label="Símbolo de Sauco"></div>
    </div>
    <div class="copy">
      <h1>Sauco</h1>
      <div class="eyebrow">PRODUCT DESIGN</div>
      <p>Firma creativa de Jaime Gómez. Producto digital, diseño web y detalle visual.</p>
    </div>
  </main>
</body>
</html>
